# --- Build ---
build:shared:
  stage: build
  image: python:${PYTHON_VERSION}
  script:
    - cd shared && python -m py_compile $(find . -name "*.py")

build:platform:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t platform-gateway:$CI_COMMIT_SHORT_SHA ./projects/09-ai-platform

# --- Deploy ---
deploy:local:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache docker-cli
    - docker compose up -d
  environment:
    name: local
  when: manual
  only:
    - main
