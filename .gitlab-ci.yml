stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  RUST_VERSION: "1.75"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/

# --- Python Lint Template ---
.lint_template:
  stage: lint
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install uv --quiet
    - uv sync --frozen

# --- Rust Lint Template ---
.rust_template:
  stage:lint
  image: rust:${RUST_VERSION}-bookworm
  before_script:
    - rustup component add rustfmt clippy

# --- Python Test Template ---
.test_template:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install uv --quiet
    - uv sync --frozen

# --- Rust Test Template ---
.rust_test_template:
  stage: test
  image: rust:${RUST_VERSION}-bookworm
  before_script: []

# --- Python Lint ---
lint:03-rag-system:
  extends: .lint_template
  script:
    - cd projects/03-rag-system && uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

lint:04-multi-agent:
  extends: .lint_template
  script:
    - cd projects/04-multi-agent && uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

lint:05-recsys:
  extends: .lint_template
  script:
    - cd projects/05-recsys && uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

lint:07-finetuning:
  extends: .lint_template
  script:
    - cd projects/07-finetuning && uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

lint:08-multimodal:
  extends: .lint_template
  script:
    - cd projects/08-multimodal && uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

# --- Rust Lint ---
lint:01-code-reviewer:
  extends: .rust_template
  script:
    - cd projects/01-code-reviewer && cargo fmt --check && cargo clippy -- -D warnings

lint:02-vector-engine:
  extends: .rust_template
  script:
    - cd projects/02-vector-engine && cargo fmt --check && cargo clippy -- -D warnings

lint:06-llm-inference:
  extends: .rust_template
  script:
    - cd projects/06-llm-inference && cargo fmt --check && cargo clippy -- -D warnings

lint:09-ai-platform:
  extends: .rust_template
  script:
    - cd projects/09-ai-platform && cargo fmt --check && cargo clippy -- -D warnings

# --- Python Test ---
test:03-rag-system:
  extends: .test_template
  script:
    - cd projects/03-rag-system && uv run pytest tests/ --cov=src/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projects/03-rag-system/coverage.xml

test:04-multi-agent:
  extends: .test_template
  script:
    - cd projects/04-multi-agent && uv run pytest tests/ --cov=src/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projects/04-multi-agent/coverage.xml

test:05-recsys:
  extends: .test_template
  script:
    - cd projects/05-recsys && uv run pytest tests/ --cov=src/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projects/05-recsys/coverage.xml

test:07-finetuning:
  extends: .test_template
  script:
    - cd projects/07-finetuning && uv run pytest tests/ --cov=src/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projects/07-finetuning/coverage.xml

test:08-multimodal:
  extends: .test_template
  script:
    - cd projects/08-multimodal && uv run pytest tests/ --cov=src/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projects/08-multimodal/coverage.xml

# --- Rust Test ---
test:01-code-reviewer:
  extends: .rust_test_template
  script:
    - cd projects/01-code-reviewer && cargo test --all-features

test:02-vector-engine:
  extends: .rust_test_template
  script:
    - cd projects/02-vector-engine && cargo test --all-features

test:06-llm-inference:
  extends: .rust_test_template
  script:
    - cd projects/06-llm-inference && cargo test --all-features

test:09-ai-platform:
  extends: .rust_test_template
  script:
    - cd projects/09-ai-platform && cargo test --all-features

# --- Build ---
build:shared:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install uv --quiet
  script:
    - cd shared && uv run python -m py_compile $(find . -name "*.py")

build:platform:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t platform-gateway:$CI_COMMIT_SHORT_SHA -f projects/09-ai-platform/Dockerfile .

# --- Deploy ---
deploy:local:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache docker-cli
    - docker compose up -d
  environment:
    name: local
  when: manual
  only:
    - main
